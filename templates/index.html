<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Retail - Shop All Products</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>Demo Retail</h1>
            <nav>
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('cart') }}">Cart ({{ session.get('cart', [])|length }})</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="filters">
            <h3>Categories</h3>
            <a href="{{ url_for('index', category='all') }}" class="{% if category == 'all' %}active{% endif %}">All Products</a>
            <a href="{{ url_for('index', category='Men\'s Clothing') }}" class="{% if category == 'Men\'s Clothing' %}active{% endif %}">Men's Clothing</a>
            <a href="{{ url_for('index', category='Women\'s Clothing') }}" class="{% if category == 'Women\'s Clothing' %}active{% endif %}">Women's Clothing</a>
            <a href="{{ url_for('index', category='Footwear') }}" class="{% if category == 'Footwear' %}active{% endif %}">Footwear</a>
            <a href="{{ url_for('index', category='Accessories') }}" class="{% if category == 'Accessories' %}active{% endif %}">Accessories</a>
        </div>

        <div class="products-grid">
            {% for product in products %}
            <div class="product-card">
                <a href="{{ url_for('product_detail', product_id=product.id) }}">
                    <img src="{{ product.image }}" alt="{{ product.name }}">
                    <h3>{{ product.name }}</h3>
                    <p class="price">${{ "%.2f"|format(product.price) }}</p>
                </a>
                <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn">Add to Cart</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
